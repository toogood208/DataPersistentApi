name: cli-ci

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore insighta-cli/Insighta.Cli.csproj

    - name: Build
      run: dotnet build insighta-cli/Insighta.Cli.csproj --no-restore --configuration Release

    - name: Pack
      run: dotnet pack insighta-cli/Insighta.Cli.csproj --no-build --configuration Release
